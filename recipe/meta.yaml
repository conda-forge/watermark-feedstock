{% set name = "watermark" %}
{% set version = "2.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 108cbad9ecf0cac9dd49c1504f3749cd74a364500e02ac6c72197a1c1aa151d7

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - ipython
    - importlib-metadata >=1.4

test:
  imports:
    - watermark
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rasbt/watermark
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: IPython magic function to print date/time stamps and various system information.
  dev_url: https://github.com/rasbt/watermark

extra:
  recipe-maintainers:
    - proinsias
